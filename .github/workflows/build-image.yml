name: Build and Push Doc Toolchain

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: opensuse/doc-container
  PYTHON_VERSION: "3.12"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # Strategy matrix to build both slim and full stages
    strategy:
      fail-fast: false
      matrix:
        stage: [daps-slim, daps-full]
        include:
          - stage: daps-slim
            tag_suffix: -slim
          - stage: daps-full
            tag_suffix: "" # Full image remains the default 'latest'

    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (Local Load)
        uses: docker/build-push-action@v5
        with:
          context: .
          # Target specific stage from Dockerfile
          target: ${{ matrix.stage }}
          load: true 
          tags: doc-toolchain:${{ matrix.stage }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Integration Tests
        run: |
          echo "Checking Python version in ${{ matrix.stage }}..."
          docker run --rm doc-toolchain:${{ matrix.stage }} python3 --version | grep "${{ env.PYTHON_VERSION }}"
          echo "Checking DAPS version in ${{ matrix.stage }}..."
          docker run --rm doc-toolchain:${{ matrix.stage }} daps --version
          
          # Only check for stylesheets/Java if we are testing the full image
          if [[ "${{ matrix.stage }}" == "daps-full" ]]; then
            echo "Checking Full-only packages..."
            docker run --rm doc-toolchain:${{ matrix.stage }} rpm -q suse-xsl-stylesheets
            docker run --rm doc-toolchain:${{ matrix.stage }} java -version
          fi

      - name: Push image to GHCR
        id: push
        if: github.event_name != 'pull_request' && success()
        uses: docker/build-push-action@v5
        with:
          context: .
          # Target specific stage for push
          target: ${{ matrix.stage }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest${{ matrix.tag_suffix }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}${{ matrix.tag_suffix }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation
        if: github.event_name != 'pull_request' && success()
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true